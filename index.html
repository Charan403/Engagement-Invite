<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panga Wedding Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Playfair Display', serif;
    background: black;
    color: white;
    text-align: center;
    overflow: hidden;
}

.scene {
    position: absolute;
    width: 100%;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    opacity: 0;
    transform: scale(0.9);
    transition: all 1.5s ease;
}

.active {
    opacity: 1;
    transform: scale(1);
}

h1 {
    font-size: 50px;
}

.name {
    font-family: 'Great Vibes', cursive;
    font-size: 70px;
    color: gold;
}

.small {
    font-size: 25px;
    margin-top: 10px;
}
</style>
</head>

<body>

<!-- Scene 1 -->
<div class="scene active">
    <h1>Panga’s Wedding Invitation</h1>
</div>

<!-- Scene 2 -->
<div class="scene">
    <div class="name">Manasa</div>
    <div class="small">with</div>
    <div class="name">Dr. Prudhvi Raj</div>
</div>

<!-- Scene 3 -->
<div class="scene">
    <h1>15th April 2026</h1>
    <div class="small">at 09:30 AM</div>
</div>

<!-- Scene 4 -->
<div class="scene">
    <h1>Meghana Conventions</h1>
    <div class="small">Jammu Junction, Navasannapeta, Srikakulam</div>
</div>

<!-- Scene 5 -->
<div class="scene">
    <h1>Sri Bandi Ramana Murthy</h1>
    <div class="small">&</div>
    <h1>Smt. Bandi Leela Kumari</h1>
</div>

<script>
let scenes = document.querySelectorAll(".scene");
let index = 0;

function showNextScene() {
    scenes[index].classList.remove("active");
    index = (index + 1) % scenes.length;
    scenes[index].classList.add("active");
}

setInterval(showNextScene, 3500);
</script>

</body>
</html>
